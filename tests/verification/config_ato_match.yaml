# Config matching ATO_Simulator's hardcoded values exactly.
# Produces 4 scanner x 1 entry x 2 exit x 2 sim = 16 config combinations.

static:
  start_margin: 9999999
  start_epoch: 1577836800        # 2020-01-01
  end_epoch: 1640995200          # 2022-01-01
  prefetch_days: 400
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: [RELIANCE, TCS, HDFCBANK, INFY, HINDUNILVR, ICICIBANK, KOTAKBANK, LT, SBIN, BHARTIARTL, AXISBANK, ITC, ASIANPAINT, MARUTI, TITAN, SUNPHARMA, BAJFINANCE, NESTLEIND, WIPRO, ULTRACEMCO, HCLTECH, TECHM, POWERGRID, NTPC, 'M&M', TATAMOTORS, ONGC, JSWSTEEL, GRASIM, BPCL]}]
  price_threshold: [45, 99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 69999999}
    - {period: 125, threshold: 369999999}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_ma: [3]
  n_day_high: [2]
  direction_score:
    - {n_day_ma: 3, score: 0.54}

exit:
  min_hold_time_days: [0, 4]
  trailing_stop_loss: [15]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [20, 30]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
