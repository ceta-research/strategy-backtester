# Phase 8A measurement config — tiny scope for local parquet A/B.
# Data window matches what ~/ATO_DATA/tick_data/ has (2019-01-01 to 2021-12-31,
# 30 symbols).

static:
  strategy_type: momentum_rebalance
  start_margin: 10000000
  start_epoch: 1577836800   # 2020-01-01
  end_epoch: 1640908800     # 2021-12-31
  prefetch_days: 250        # ~1 year (fits in 2019 prefetch data)
  data_granularity: day
  data_provider: parquet

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 30, threshold: 10000000}  # relaxed for 30-stock universe
  n_day_gain_threshold:
    - {n: 5, threshold: -999}

# Single entry config to keep the A/B clean.
entry:
  momentum_lookback_days: [63]
  rebalance_interval_days: [21]
  num_positions: [10]
  regime_instrument: ['']     # no regime filter
  regime_sma_period: [0]
  moc_signal_lag_days: [0]    # overridden by measure_bias_impact.py

exit:
  max_hold_days: [0]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
