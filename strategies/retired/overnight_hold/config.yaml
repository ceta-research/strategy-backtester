static:
  start_margin: 500000
  start_epoch: 1577836800      # 2020-01-01
  end_epoch: 1741219200        # 2025-03-06
  prefetch_days: 30
  data_granularity: day
  strategy_type: overnight_hold

scanner:
  instruments:
    - [{exchange: US, symbols: []}]
  price_threshold: [20]
  avg_day_transaction_threshold:
    - {period: 20, threshold: 50000000}
  n_day_gain_threshold:
    - {n: 30, threshold: -999}

entry:
  # Buy at close unconditionally (all liquid stocks)
  # Optional filter: only buy on down days (mean reversion tilt)
  buy_on_down_day: [false, true]    # true = only buy when close < open
  min_rsi_14: [0]                   # 0 = no RSI filter; 30 = only oversold

exit:
  # Sell at next day's open
  exit_at: [next_open]
  max_hold_days: [1]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [1]
  max_positions: [20, 50]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: fixed, value: 50000}
