# Enhanced Breakout: Multi-layer confirmed breakout sweep
# Target: 20% CAGR via signal quality + concentration + leverage
#
# Entry layers: breakout + quality + momentum + volume + fundamentals + regime
# Exit: immediate TSL (no peak recovery wait) + max hold
# Sim: concentrated (5-15 positions) + optional leverage (1.0-1.5x)
#
# Config combos: 1 scanner x 32 entry x 6 exit x 6 sim = 1152 total

static:
  strategy_type: enhanced_breakout
  start_margin: 1000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1735689600        # 2025-01-01
  prefetch_days: 600           # Need 2yr+ history for quality filter
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  # Breakout window: 2-day = tight breakout, 5-day = confirmed breakout
  breakout_window: [2, 5]
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  momentum_lookback_days: [63]
  momentum_percentile: [0.20, 0.30]
  rerank_interval_days: [63]
  rescreen_interval_days: [63]
  # Volume: 0=off, 1.5=confirm with 50% above average
  volume_multiplier: [0, 1.5]
  volume_avg_period: [20]
  # Fundamentals: 0=off, 15=ROE>15%
  roe_threshold: [0, 15]
  de_threshold: [0]
  pe_threshold: [0]
  fundamental_missing_mode: [skip]
  # Regime: 0=off, 200=NIFTYBEES>200SMA
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [0, 200]
  # 2 x 2 x 2 x 2 x 2 = 32 entry combos... but volume_avg_period,
  # rerank, rescreen, consecutive_years, min_yearly, de, pe, missing_mode
  # are single-valued so total = 2 x 2 x 2 x 2 x 2 = 32

exit:
  trailing_stop_pct: [8, 10, 15]
  max_hold_days: [252, 504]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [7, 10, 15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1, 1.3]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
