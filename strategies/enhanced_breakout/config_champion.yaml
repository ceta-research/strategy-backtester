# Enhanced Breakout: Champion Config
# Optimized from Round 0-3, re-verified on post-audit engine 2026-04-23.
#
# HONEST (post-audit, commit fbcd36a+):
# Full-period (2010-2025): CAGR=16.40%, MDD=-25.0%, Calmar=0.656
#
# PRE-AUDIT (buggy metrics): Cal 0.499, CAGR 11.85%, MDD -23.8%
#
# Changes from baseline: quality 2→3, pctile 0.30→0.25, TSL 12→18,
#   hold 252→126, lookback 63→21, pos 10 (unchanged)

static:
  strategy_type: enhanced_breakout
  start_margin: 1000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1735689600        # 2025-01-01
  prefetch_days: 800
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  breakout_window: [5]
  consecutive_positive_years: [3]
  min_yearly_return_pct: [0]
  momentum_lookback_days: [21]
  momentum_percentile: [0.25]
  rerank_interval_days: [63]
  rescreen_interval_days: [63]
  volume_multiplier: [0]
  volume_avg_period: [20]
  roe_threshold: [0]
  pe_threshold: [0]
  de_threshold: [0]
  fundamental_missing_mode: [skip]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [0]

exit:
  trailing_stop_pct: [18]
  max_hold_days: [126]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [10]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
