# Round 1 addendum: direction_score sweep on champion config
# Test ATO-style market breadth filter (% of stocks above N-day MA)
#
# Sweep: ds_n_day_ma x ds_threshold combos
# MA periods: 3 (ATO default), 5, 10
# Thresholds: 0 (disabled), 0.40, 0.50, 0.54 (ATO default), 0.60
# Total: 3 x 5 = 15 entry configs, but threshold=0 means disabled regardless of MA
# Effective: 1 (disabled) + 3x4 (enabled combos) = 13 configs

static:
  strategy_type: enhanced_breakout
  start_margin: 1000000
  start_epoch: 1262304000
  end_epoch: 1735689600
  prefetch_days: 800
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  breakout_window: [5]
  consecutive_positive_years: [3]
  min_yearly_return_pct: [0]
  momentum_lookback_days: [21]
  momentum_percentile: [0.25]
  rerank_interval_days: [63]
  rescreen_interval_days: [63]
  volume_multiplier: [0]
  volume_avg_period: [20]
  roe_threshold: [0]
  pe_threshold: [0]
  de_threshold: [0]
  fundamental_missing_mode: [skip]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [0]
  direction_score_n_day_ma: [3, 5, 10]
  direction_score_threshold: [0, 0.40, 0.50, 0.54, 0.60]

exit:
  trailing_stop_pct: [18]
  max_hold_days: [126]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [10]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
