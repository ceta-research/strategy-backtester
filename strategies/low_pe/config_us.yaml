static:
  start_margin: 1000000
  start_epoch: 946684800          # 2000-01-01
  end_epoch: 1741219200           # 2025-03-06
  prefetch_days: 100              # Minimal — no technical indicators needed
  data_granularity: day
  strategy_type: low_pe

scanner:
  instruments:
    - [{exchange: US, symbols: []}]
  price_threshold: [5]
  avg_day_transaction_threshold:
    - {period: 50, threshold: 10000000}
  n_day_gain_threshold:
    - {n: 30, threshold: -999}

entry:
  pe_max: [15]
  pe_min: [0]
  roe_min: [0.10]
  de_max: [1.0]
  mktcap_min: [1000000000]        # $1B
  max_stocks: [30]
  min_stocks: [10]

exit:
  stop_loss_pct: [0]              # No stop-loss (hold to next rebalance)

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [1]
  max_positions: [30]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: fixed, value: 50000}
