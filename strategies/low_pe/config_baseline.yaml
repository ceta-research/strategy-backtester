# low_pe R0 baseline (NSE 2010-2026, post-audit engine fbcd36a+).
# Defaults from signal: pe_max=15, roe_min=0.10, de_max=1.0, max=30, mktcap_min=1e9 (₹1B), SL=0.
# Mirrored the trending_value scanner so universe is comparable.

static:
  strategy_type: low_pe
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-19
  prefetch_days: 300
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  pe_max: [15]
  pe_min: [0]
  roe_min: [0.10]
  de_max: [1.0]
  mktcap_min: [10000000000]   # ₹10B (₹1000Cr)
  max_stocks: [30]
  min_stocks: [10]

exit:
  stop_loss_pct: [0]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [30]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
