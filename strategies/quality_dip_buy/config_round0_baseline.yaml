# Round 0 baseline — schema defaults only.
# Post-audit engine (fbcd36a+), nse.nse_charting_day.

static:
  strategy_type: quality_dip_buy
  start_margin: 10000000       # Rs 1 crore
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1741219200        # 2025-03-06
  prefetch_days: 1500          # ~4 years: need 756 trading days for 3yr quality filter
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [3]
  min_yearly_return_pct: [0]
  dip_threshold_pct: [10]
  peak_lookback_days: [126]
  rescreen_interval_days: [63]

exit:
  trailing_stop_pct: [5]
  max_hold_days: [504]

simulation:
  default_sorting_type: [top_dipper]
  order_sorting_type: [top_dipper]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [0.95]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}

