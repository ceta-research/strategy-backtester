static:
  strategy_type: quality_dip_buy
  start_margin: 10000000       # Rs 1 crore
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1741219200        # 2025-03-06
  prefetch_days: 1500
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# V3: regime filter + RSI + higher quality bar + concentrated
# Best from v2: 2yr filter, no sector limit, 10% TSL, 504d hold
#
# Entry: 2 x 2 x 1 x 1 x 1 x 2 x 2 = 16 combos
entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0, 10]            # Higher quality bar: 10% min/yr
  dip_threshold_pct: [5, 7]
  peak_lookback_days: [63]
  rescreen_interval_days: [63]
  max_per_sector: [0]
  rsi_threshold: [0, 30]                    # 0=off, 30=oversold confirmation
  regime_instrument: ["NSE:NIFTYBEES"]
  regime_sma_period: [0, 200]               # 0=off, 200=bull market only

# Exit: 1 x 1 = 1 combo (best from v2)
exit:
  trailing_stop_pct: [10]
  max_hold_days: [504]

# Simulation: 3 combos
simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [5, 10, 15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [0.95]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}

# Total: 16 x 1 x 3 = 48 configs
