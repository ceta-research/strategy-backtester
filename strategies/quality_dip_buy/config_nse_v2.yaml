static:
  strategy_type: quality_dip_buy
  start_margin: 10000000       # Rs 1 crore
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1741219200        # 2025-03-06
  prefetch_days: 1500          # ~4 years for quality filter lookback
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# Entry: 2 x 1 x 2 x 2 x 1 x 2 = 16 combos
entry:
  consecutive_positive_years: [2, 3]       # Idea 2: relaxed (2yr) vs strict (3yr)
  min_yearly_return_pct: [0]
  dip_threshold_pct: [5, 7]               # Best from v1
  peak_lookback_days: [63, 252]           # Best from v1
  rescreen_interval_days: [63]
  max_per_sector: [0, 3]                  # Idea 3: 0=no limit, 3=sector diversified

# Exit: 2 x 1 = 2 combos (only best from v1)
exit:
  trailing_stop_pct: [5, 10]
  max_hold_days: [504]

# Simulation: 3 combos
simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [10, 15, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [0.95]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}

# Total: 16 x 2 x 3 = 96 configs
