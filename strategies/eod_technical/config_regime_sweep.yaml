# Regime exit sweep on CURRENT champion (1_3_6_2: ndma=3, ndh=5, ds={3,0.54},
# mh=3, tsl=10, max_pos=15). Phase 1 holdout retraining failed Pareto, so the
# current champion is the regime baseline.
#
# Sweep: regime_sma_period × force_exit_on_regime_flip = 8 configs. Mirrors
# eod_breakout/config_regime_sweep.yaml. Slow path is triggered (per-entry
# order generation) because regime params vary across configs.
#
# Hypothesis: regime gate may help robustness. But smoke test (SMA=100,
# force_exit=True on this champion) gave CAGR 9% / MDD -44% — much worse than
# unfiltered. eod_technical's 2025 was already +2.69% (not a collapse), so
# regime gate may have nothing to fix. Sweeping all 8 anyway to confirm.

static:
  strategy_type: eod_technical
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-19
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# Current champion entry params + regime variations
entry:
  n_day_ma: [3]
  n_day_high: [5]
  direction_score:
    - {n_day_ma: 3, score: 0.54}
  regime_instrument: ["NSE:NIFTYBEES"]
  regime_sma_period: [100, 150, 200, 250]
  force_exit_on_regime_flip: [false, true]

exit:
  min_hold_time_days: [3]
  trailing_stop_pct: [10]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
