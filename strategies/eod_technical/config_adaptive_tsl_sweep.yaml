# eod_technical adaptive TSL sweep (Phase 5e, 2026-04-28).
#
# Tests the hypothesis: "Once MFE from entry exceeds X%, tighten TSL
# from 10% to Y%" captures more of the peak return and reduces give_back.
#
# Mean MFE (IS) = 19.46%, mean give_back = 16.03%. Champion TSL = 10%.
#
# Sweep: 4 thresholds × 3 tight-pct = 12 exit configs (+ baseline = 13).
# Config with tsl_tighten_after_pct=999 is baseline (disabled).

static:
  strategy_type: eod_technical
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  n_day_ma: [3]
  n_day_high: [5]
  direction_score:
    - {n_day_ma: 3, score: 0.54}

exit:
  min_hold_time_days: [3]
  trailing_stop_pct: [10]
  tsl_tighten_after_pct: [999, 10, 15, 20, 30]
  tsl_tight_pct: [0, 3, 5, 7]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
