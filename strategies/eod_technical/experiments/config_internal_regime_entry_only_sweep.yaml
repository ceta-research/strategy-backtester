# eod_technical: internal regime as ENTRY-ONLY gate (no force-exit).
# DS disabled. Replaces DS with scanner-universe breadth.

static:
  strategy_type: eod_technical
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  n_day_ma: [3]
  n_day_high: [5]
  direction_score:
    - {n_day_ma: 3, score: 0.0}
  regime_instrument: [""]
  regime_sma_period: [0]
  force_exit_on_regime_flip: [false]
  internal_regime_sma_period: [50, 100, 150, 200]
  internal_regime_threshold: [0.3, 0.4, 0.5, 0.6]

exit:
  min_hold_time_days: [3]
  trailing_stop_pct: [10]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
