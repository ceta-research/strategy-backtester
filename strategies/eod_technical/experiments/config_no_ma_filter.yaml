# eod_technical champion variant: drop `close > n_day_ma` clause.
#
# Phase 4 hypothesis test (2026-04-28). The Phase-3 audit found
# `clause_close_gt_ma` has conditional_fail_rate 0.13% on the
# champion config — when the other entry clauses pass, the MA
# clause additionally rejects only ~0.13% of rows. Hypothesis:
# removing it should leave performance ~unchanged.
#
# Compares against `config_champion.yaml` (CAGR 19.63%, MDD -25.9%,
# Calmar 0.757, Sharpe ~1.07).

static:
  strategy_type: eod_technical
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  n_day_ma: [3]                # still computed (direction-score uses MA)
  n_day_high: [5]
  direction_score:
    - {n_day_ma: 3, score: 0.54}
  disable_close_gt_ma: [true]  # <-- the only difference vs champion

exit:
  min_hold_time_days: [3]
  trailing_stop_pct: [10]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
