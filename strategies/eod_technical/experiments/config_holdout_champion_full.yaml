# Phase 1 holdout champion (1_9_2_2 of holdout_train_2010-2024 sweep) verified
# on full 2010-2026 window. The "true OOS test" is 2025+ behavior.
#
# Holdout sweep result (2010-2024 only):
#   CAGR=21.27%, MDD=-26.82%, Calmar=0.793, Sharpe=1.159, trades=1193
#
# Current champion in same sweep (1_3_6_2): rank #8 of 648 by Calmar.
#   CAGR=20.24%, MDD=-26.63%, Calmar=0.760, Sharpe=1.084
#
# Param diff vs current champion: ndma 3→5, min_hold 3→0. Everything else
# unchanged. Top-5 cluster all share ndh=5, tsl=10, max_pos=15.

static:
  strategy_type: eod_technical
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-19 (full window)
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  n_day_ma: [5]
  n_day_high: [5]
  direction_score:
    - {n_day_ma: 3, score: 0.54}

exit:
  min_hold_time_days: [0]
  trailing_stop_pct: [10]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
