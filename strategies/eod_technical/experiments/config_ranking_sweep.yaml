# eod_technical ranking-sort sweep (Phase 5, 2026-04-28).
#
# Tests all 4 ranking strategies × 4 window sizes = 16 sim configs.
# Champion: top_gainer, window=30.
# Everything else (scanner/entry/exit) is champion-identical.

static:
  strategy_type: eod_technical
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  n_day_ma: [3]
  n_day_high: [5]
  direction_score:
    - {n_day_ma: 3, score: 0.54}

exit:
  min_hold_time_days: [3]
  trailing_stop_pct: [10]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer, top_average_txn, top_performer, top_dipper]
  order_ranking_window_days: [10, 30, 60, 120]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
