static:
  strategy_type: eod_technical
  start_margin: 9999999
  start_epoch: 1104537600      # 2005-01-01
  end_epoch: 1773878400        # 2026-03-19
  prefetch_days: 400
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: [NIFTYBEES]}]
  price_threshold: [1]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 1000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_ma: [3, 5, 10, 20]
  n_day_high: [2, 5, 10]
  direction_score:
    - {n_day_ma: 3, score: 0.5}

exit:
  min_hold_time_days: [5, 10, 20]
  trailing_stop_loss: [5, 8, 10, 15]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [1]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 100}
