# R1: Vary SMAs, pullback, targets, stops. 3 × 3 × 2 × 3 × 3 × 3 = 486 (capped)
# Reduce: 3 × 1 × 2 × 3 × 3 × 3 = 162
static:
  strategy_type: swing_master
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 100
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  sma_short: [10, 20, 50]
  sma_long: [50, 100, 200]
  pullback_days: [2, 3, 5]

exit:
  target_pct: [0.07, 0.15, 0.30]
  stop_loss_pct: [0.04, 0.10, 0.15]
  max_hold_days: [20, 60, 120]
  trailing_buffer_pct: [0.002]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
