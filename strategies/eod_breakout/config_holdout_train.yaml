# R2 sweep on 2010-2024 only (true holdout for 2025-onward).
# Identical params to config_round2_full.yaml except end_epoch.
# Purpose: pick a champion using only data the live 2025 drawdown wasn't part of,
# then test that champion on 2025-2026 to see if regime fragility is param-specific.
#
# 1152 configs — same as R2.

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1735689600       # 2025-01-01 (HOLDOUT BOUNDARY)
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50, 99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [2, 3, 5, 7]
  n_day_ma: [3, 5, 10]
  direction_score:
    - {n_day_ma: 3, score: 0.54}
    - {n_day_ma: 5, score: 0.40}

exit:
  min_hold_time_days: [0, 7]
  trailing_stop_pct: [8, 15]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer, top_performer]
  order_ranking_window_days: [180]
  max_positions: [15, 20, 30]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
