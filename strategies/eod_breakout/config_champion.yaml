# Champion config: regime+holdout (promoted 2026-04-27).
#
# 2026-04-27 promotion:
#   Holdout-trained champion (R2 sweep on 2010-2024 only) + NIFTYBEES SMA(100)
#   regime exit with force-exit on regime flip.
#
# Full-period (2010-2026): CAGR 17.68%, MDD -26.75%, Cal 0.661, Sharpe 1.334
# 2025 OOS: +18.67% (vs prior champion -16.57% — single biggest improvement
#   delivered in eod_breakout history).
#
# Key changes vs prior champion (config_champion_pre_2026-04-27.yaml):
#   price_threshold: 50 → 99
#   n_day_high: 7 → 3
#   n_day_ma: 5 → 10
#   direction_score: {3, 0.54} → {5, 0.40}
#   min_hold_time_days: 0 → 7
#   regime_instrument: "" → "NSE:NIFTYBEES"
#   regime_sma_period: 0 → 100
#   force_exit_on_regime_flip: false → true
#
# See strategies/eod_breakout/REGIME_AND_ENSEMBLE_2026-04-27.md for full
# experiment writeup. See HOLDOUT_EXPERIMENT_2026-04-26.md for parameter-only
# improvement (held back ~1.8pp CAGR vs adding regime exit).

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-19
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [3]
  n_day_ma: [10]
  direction_score:
    - {n_day_ma: 5, score: 0.40}
  regime_instrument: ["NSE:NIFTYBEES"]
  regime_sma_period: [100]
  force_exit_on_regime_flip: [true]

exit:
  min_hold_time_days: [7]
  trailing_stop_pct: [8]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
