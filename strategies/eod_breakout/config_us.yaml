# eod_breakout champion params applied to US market.
# Adapted: price threshold $20 (vs INR 99), turnover $50M (vs INR 70Cr),
# start_margin $1M (vs INR 1Cr).

static:
  strategy_type: eod_breakout
  start_margin: 1000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-19
  prefetch_days: 500
  data_granularity: day
  data_provider: cr

scanner:
  instruments:
    - [{exchange: US, symbols: []}]
  price_threshold: [20]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 50000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [3]
  n_day_ma: [10]
  direction_score:
    - {n_day_ma: 5, score: 0.0}
  regime_instrument: [""]
  regime_sma_period: [0]
  force_exit_on_regime_flip: [true]
  internal_regime_sma_period: [50]
  internal_regime_threshold: [0.4]
  internal_regime_exit_threshold: [0.35]

exit:
  min_hold_time_days: [0]
  trailing_stop_pct: [8]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
