# Exact match of ATO_Simulator best config (32.5% CAGR from notebook)
# Entry: n_day_high=2, n_day_ma=3, direction_score={3d, 0.54}
# Exit: tsl=15%, min_hold=0d
# Sim: top_performer, 180d, pos=20, sizing=4.5% of avg_txn
# Also test nearby variations
# Sweep: scanner (2) x entry (4) x exit (2) x sim (4) = 64 configs

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-17
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [45, 99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [2, 3]
  n_day_ma: [3, 5]
  direction_score:
    - {n_day_ma: 3, score: 0.54}

exit:
  min_hold_time_days: [0, 4]
  trailing_stop_loss: [15]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [10, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
    - {type: fixed, value: 1000000000}

# Total: 2 scanner x 4 entry x 2 exit x 4 sim = 64 configs
