# eod_breakout variant: no direction_score + regime only (2026-04-28).
#
# Champion-identical except direction_score threshold set to 0.0
# (everything passes). The regime gate (NIFTYBEES > SMA100) with
# force-exit on regime flip is the sole macro-level filter.
#
# Full-period (2010-2026): CAGR=19.73%, MDD=-27.52%, Sharpe=1.320, Calmar=0.717
# Trades=1861 (vs champion 1795).
#
# The direction_score filter was over-screening: stocks breaking out
# when market breadth is low (contrarian breakouts) are the strongest
# entries. With the regime gate already protecting against bear markets,
# DS was redundantly removing high-conviction trades.
#
# Trade-off: +2.05pp CAGR, +0.14 Sharpe vs champion. MDD is 0.77pp
# worse (tolerable — Calmar still improves 0.661 → 0.717).

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-19
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [3]
  n_day_ma: [10]
  direction_score:
    - {n_day_ma: 5, score: 0.0}
  regime_instrument: ["NSE:NIFTYBEES"]
  regime_sma_period: [100]
  force_exit_on_regime_flip: [true]

exit:
  min_hold_time_days: [7]
  trailing_stop_pct: [8]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
