# Exact ATO_Simulator config — reproduce the 32.5% CAGR result
# Period: ~2015 to ~2025 (matching ATO's "10 years back" dynamic window)
# Entry: ndh=2, ndm=3, ds={3, 0.54}
# Exit: min_hold=[0, 4], tsl=15
# Sim: top_performer ranking, pos=[20, 30]
# Scanner: price=[45, 99], avg_txn=[70M, 370M]
# Total: 4 scanner x 1 entry x 2 exit x 2 sim = 16 configs

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1420070400     # 2015-01-01
  end_epoch: 1738368000       # 2025-02-01
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [45, 99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
    - {period: 125, threshold: 370000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [2]
  n_day_ma: [3]
  direction_score:
    - {n_day_ma: 3, score: 0.54}

exit:
  min_hold_time_days: [0, 4]
  trailing_stop_pct: [15]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [20, 30]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
