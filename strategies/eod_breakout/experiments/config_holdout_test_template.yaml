# Template for testing the holdout-trained champion on full period (2010-2026).
# After holdout R2 completes, fill the entry/exit/sim params with the new champion's,
# then run with this end_epoch to get full-period + 2025-onward OOS performance.

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-19 (full period — measures 2025+ OOS implicitly)
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  # FILL: price_threshold from holdout champion
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  # FILL: from holdout champion
  n_day_high: [7]
  n_day_ma: [5]
  direction_score:
    - {n_day_ma: 3, score: 0.54}

exit:
  # FILL: from holdout champion
  min_hold_time_days: [0]
  trailing_stop_pct: [8]

simulation:
  # FILL: from holdout champion
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
