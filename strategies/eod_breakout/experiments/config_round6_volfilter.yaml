# R6: universe-level vol filter sweep on regime+holdout champion baseline.
#
# Hypothesis: dropping high-vol stocks from the universe should reduce MDD
# (high-vol losers contribute disproportionately to drawdowns) without
# proportional CAGR loss. This is a signal-side approximation of true
# vol-scaled position sizing (which would require simulator changes).
#
# 6 thresholds × 1 lookback = 6 configs. 999 = no filter (control).

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-19
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [3]
  n_day_ma: [10]
  direction_score:
    - {n_day_ma: 5, score: 0.40}
  regime_instrument: ["NSE:NIFTYBEES"]
  regime_sma_period: [100]
  force_exit_on_regime_flip: [true]
  max_stock_vol_pct: [30, 40, 50, 60, 70, 999]
  vol_lookback_days: [60]

exit:
  min_hold_time_days: [7]
  trailing_stop_pct: [8]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
