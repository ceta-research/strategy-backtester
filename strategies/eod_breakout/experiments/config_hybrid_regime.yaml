# eod_breakout: HYBRID regime — internal for entry, NIFTYBEES for exit.
# Entry: scanner-universe breadth > threshold gates entries.
# Exit: NIFTYBEES > SMA(N) force-exit on regime flip.
# No DS. Tests best internal entry params with NIFTYBEES exit.

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [3]
  n_day_ma: [10]
  direction_score:
    - {n_day_ma: 5, score: 0.0}
  # No main external regime (entry uses internal only)
  regime_instrument: [""]
  regime_sma_period: [0]
  force_exit_on_regime_flip: [true]
  # Internal regime for entry gating
  internal_regime_sma_period: [50]
  internal_regime_threshold: [0.3, 0.4, 0.5, 0.6]
  # Separate exit regime: NIFTYBEES for force-exit
  exit_regime_instrument: ["NSE:NIFTYBEES"]
  exit_regime_sma_period: [100]

exit:
  min_hold_time_days: [7]
  trailing_stop_pct: [8]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
