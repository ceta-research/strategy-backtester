# Round 2: Focused search — cross IMPORTANT params
#
# IMPORTANT: n_day_high, trailing_stop_pct, max_positions
# MODERATE (included): n_day_ma
# FIXED at marginal bests: ds_score=0.40, ds_ma=5, min_hold=7
#
# Total: 4 n_day_high x 4 TSL x 3 max_pos x 3 n_day_ma = 144 configs

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [5, 6, 7, 8]
  n_day_ma: [5, 10, 20]
  direction_score:
    - {n_day_ma: 5, score: 0.40}

exit:
  min_hold_time_days: [7]
  trailing_stop_pct: [3, 5, 8, 15]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [10, 15, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
