# EOD Breakout: ported from ATO_Simulator default config
# Entry: N-day high breakout + bullish candle + direction score (market breadth)
# Exit: Trailing stop-loss from max price, at next-day open
#
# Step 1+2: Native NSE data + entry param sweep (27 configs)
# Exit/sim fixed to best FMP baseline values

static:
  strategy_type: eod_breakout
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-17
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  n_day_high: [2, 3, 5]
  n_day_ma: [3, 5, 10]
  direction_score:
    - {n_day_ma: 3, score: 0.50}
    - {n_day_ma: 3, score: 0.54}
    - {n_day_ma: 3, score: 0.60}

exit:
  min_hold_time_days: [4]
  trailing_stop_pct: [15]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [30]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
