# Forced selling dip: idiosyncratic dip + volume spike on quality stocks
# Standalone result: Calmar 0.64. Engine result expected lower (honest).

static:
  strategy_type: forced_selling_dip
  start_margin: 10000000
  start_epoch: 1262304000   # 2010-01-01
  end_epoch: 1773878400     # 2026-03-17
  prefetch_days: 1500
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  sector_lookback_days: [5, 20]
  dip_threshold_pct: [5, 7, 10]
  volume_multiplier: [1.5, 2.0, 3.0]
  peak_lookback_days: [63]
  rescreen_interval_days: [63]
  roe_threshold: [15]
  pe_threshold: [25]
  de_threshold: [0]
  fundamental_missing_mode: ['skip']
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [10]
  max_hold_days: [504]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [5, 10]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}

# Total: 18 entry x 1 exit x 2 sim = 36 configs
