# Index breakout: N-day high breakout on NIFTYBEES with trailing stop-loss
# Total: 4 entry x 4 exit x 1 sim = 16 configs

static:
  strategy_type: index_breakout
  start_margin: 1000000
  start_epoch: 1104537600      # 2005-01-01
  end_epoch: 1773878400        # 2026-03-17
  prefetch_days: 100
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: [NIFTYBEES]}]
  price_threshold: [1]
  avg_day_transaction_threshold:
    - {period: 20, threshold: 1000000}
  n_day_gain_threshold:
    - {n: 30, threshold: -999}

entry:
  lookback_days: [2, 3, 5, 10]
  regime_instrument: [""]
  regime_sma_period: [0]

exit:
  trailing_stop_pct: [3, 5, 8, 10]
  max_hold_days: [0]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [1]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: fixed, value: 950000}
