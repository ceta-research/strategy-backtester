# trending_value champion (2026-04-24, post-audit engine fbcd36a+).
#
# Full-period (2010-2026): CAGR=16.89%, MDD=-35.1%, Calmar=0.481, Sharpe est ~0.55
# Champion by CAGR (close-2nd by Calmar, which was 0.491 at lower CAGR 15.31%).
#
# Params: dta=1.0 (no debt cap), roe>=0.10, lb=1yr, top_n=75, quarterly rebal,
#         mh=365d min hold, tsl=20%, pos=15, top_gainer
#
# Data caveat: FMP NSE fundamentals sparse pre-~2015. Effective signal start ~2015.

static:
  strategy_type: trending_value
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 800
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  max_debt_to_assets: [1.0]
  min_roe: [0.10]
  growth_lookback_years: [1]
  growth_weights:
    - {revenue: 0.5, earnings: 0.5}
  top_n_stocks: [75]
  rebalance_frequency: [quarterly]

exit:
  min_hold_days: [365]
  trailing_stop_pct: [20]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
