name: trending_value
display_name: Trending Value
description: Combined value + growth screen with momentum overlay. Finds undervalued companies with improving fundamentals and price trend.
category: factor
source: book
theory: "Screen for low debt, high ROE companies with revenue/earnings growth, then rank by price momentum. Based on James O'Shaughnessy's approach."

entry:
  - name: max_debt_to_assets
    label: Max Debt/Assets
    type: float
    default: 0.5
    range: [0.0, 1.0]
    hint: Maximum debt-to-assets ratio

  - name: min_roe
    label: Min ROE
    type: float
    default: 0.1
    range: [0.0, 0.5]
    hint: Minimum return on equity (0 = no filter)

  - name: growth_lookback_years
    label: Growth Lookback Years
    type: int
    default: 3
    range: [1, 10]
    hint: Years of historical growth data required

  - name: growth_weights
    label: Growth Weights
    type: dict
    default: {revenue: 0.5, earnings: 0.5}
    hint: "Weights for growth scoring: revenue vs earnings"

  - name: top_n_stocks
    label: Portfolio Size
    type: int
    default: 15
    range: [5, 50]
    hint: Number of top-ranked stocks to hold

  - name: rebalance_frequency
    label: Rebalance Frequency
    type: enum
    options: [quarterly, yearly]
    default: quarterly
    hint: How often to rebalance the portfolio

exit:
  - name: min_hold_days
    label: Min Hold Days
    type: int
    default: 90
    range: [30, 504]
    hint: Minimum days before exit allowed

  - name: trailing_stop_pct
    label: Trailing Stop %
    type: float
    default: 0.2
    range: [0.05, 0.5]
    hint: Trailing stop from peak (0.2 = 20%)
