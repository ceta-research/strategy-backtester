# R3: fine grid around R2 Calmar winner. dta=1.0 fixed.
# 3 × 3 × 2 × 3 × 2 = 108 configs

static:
  strategy_type: trending_value
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 800
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  max_debt_to_assets: [1.0]
  min_roe: [0.08, 0.10, 0.12]
  growth_lookback_years: [1]
  growth_weights:
    - {revenue: 0.5, earnings: 0.5}
  top_n_stocks: [50, 75, 100]
  rebalance_frequency: [quarterly]

exit:
  min_hold_days: [180, 365]
  trailing_stop_pct: [15, 20, 25]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
