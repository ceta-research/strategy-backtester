# R1b: peak_lookback × yr × tier_multiplier. Fixed: n_tiers=2, dip=5, tsl=10, pos=15
# 3 × 3 × 2 = 18 entry combos = 18 configs

static:
  strategy_type: quality_dip_tiered
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 1500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [2, 3, 4]
  min_yearly_return_pct: [0]
  n_tiers: [2]
  tier_multiplier: [1.5, 2.0]
  base_dip_threshold_pct: [5]
  peak_lookback_days: [30, 63, 120]
  rescreen_interval_days: [63]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [10]
  max_hold_days: [504]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [3]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
