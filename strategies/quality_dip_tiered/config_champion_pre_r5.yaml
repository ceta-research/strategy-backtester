# quality_dip_tiered champion (2026-04-24, post-audit engine fbcd36a+).
#
# Full-period (2010-2026): CAGR=18.39%, MDD=-47.4%, Calmar=0.388, Sharpe=0.76
# R3 champion by Calmar (also ~top-3 by CAGR in R2/R3 plateau).
#
# Params: yr=2, n_tiers=2, tier_mult=1.5, base_dip=4, peak=30, regime=NIFTYBEES>200,
#         tsl=8, max_hold=504, sort=top_gainer, pos=15, ppi=3
#
# DCA thesis works on NSE: n_tiers=2 (tier1 at 4%, tier2 at 6%) beats single-entry qdb
# (11.63%) decisively. Tighter dip threshold (4% vs qdb's 5%) and shorter peak (30 vs 63)
# generate more frequent entries.

static:
  strategy_type: quality_dip_tiered
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 1500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  n_tiers: [2]
  tier_multiplier: [1.5]
  base_dip_threshold_pct: [4]
  peak_lookback_days: [30]
  rescreen_interval_days: [63]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [8]
  max_hold_days: [504]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [3]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
