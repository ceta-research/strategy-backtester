# Minimal tiered smoke test: single 3-tier config, 3-year range.
# Purpose: verify Layer 2 OrderKey fix enables tier-independent execution.
# Pre-fix: only one tier per (instrument, entry_epoch, exit_epoch) executes.
# Post-fix: all n_tiers execute with distinct OrderKeys.

static:
  strategy_type: quality_dip_tiered
  start_margin: 10000000
  start_epoch: 1577836800      # 2020-01-01
  end_epoch: 1672531200        # 2023-01-01  (3yr window)
  prefetch_days: 1500          # need ~4yr warmup for quality filter
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# Single entry config: 3 tiers at 5%/7.5%/11.25% dip
entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  n_tiers: [3]
  tier_multiplier: [1.5]
  base_dip_threshold_pct: [5]
  peak_lookback_days: [63]
  rescreen_interval_days: [63]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [10]
  max_hold_days: [504]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [10]
  max_positions_per_instrument: [3]  # crucial: must allow all 3 tiers open
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
