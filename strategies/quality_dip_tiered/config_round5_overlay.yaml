# R5: post-audit overlay refit. Goal: shave the 4.5-year MDD without losing CAGR.
#
# Hypothesis: deep MDD driven by holding losers waiting for peak recovery
# (max_hold=504d = 2yr) AND by DCA re-entries (ppi=3) deepening drawdowns.
# Sweep tightens both. TSL [6,8,10] also tested in case 8% is not at the
# Calmar-optimum after R2's 8/10/12 grid.
#
# 4 × 3 × 3 = 36 configs. All other params held at champion values.

static:
  strategy_type: quality_dip_tiered
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 1500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  n_tiers: [2]
  tier_multiplier: [1.5]
  base_dip_threshold_pct: [4]
  peak_lookback_days: [30]
  rescreen_interval_days: [63]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [6, 8, 10]
  max_hold_days: [126, 252, 378, 504]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1, 2, 3]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
