# Breakout Pullback: Round 1 sweep.
# Buy the dip after a confirmed breakout + internal regime.
# Sweep: breakout_window × pullback_pct × breakout_lookback

static:
  strategy_type: breakout_pullback
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-19
  prefetch_days: 500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [99]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  breakout_window: [20, 50]
  breakout_lookback: [5, 10, 15]
  pullback_pct: [3, 5, 8, 12]
  trend_ma_period: [50]
  regime_instrument: [""]
  regime_sma_period: [0]
  force_exit_on_regime_flip: [true]
  internal_regime_sma_period: [50]
  internal_regime_threshold: [0.4]

exit:
  min_hold_time_days: [0]
  trailing_stop_pct: [8]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [180]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
