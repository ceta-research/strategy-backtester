static:
  strategy_type: momentum_cascade
  start_margin: 10000000       # Rs 1 crore
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 600
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# Focus on top 3 configs: C_safe, D_calmar, A_best
entry:
  fast_lookback_days: [42]
  slow_lookback_days: [126]
  accel_threshold_pct: [2, 3]
  min_momentum_pct: [15, 20]
  breakout_window: [63]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [50, 200]

exit:
  trailing_stop_pct: [10, 12, 13]
  max_hold_days: [504]

# FIXED sizing (equal weight, no liquidity cap) - matches standalone behavior
simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [7, 10, 14]
  max_positions_per_instrument: [1, 3]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 10000000}    # 1 crore cap per order (effectively unlimited)

# Total: 8 entry x 3 exit x 6 sim = 144 configs
