# momentum_cascade champion config
# Optimized via Rounds 0-4 (2026-04-15), re-verified on post-audit engine 2026-04-23.
#
# HONEST (post-audit, commit fbcd36a+):
# Full-period (2010-2026): CAGR=13.75%, MDD=-29.9%, Calmar=0.460
#
# PRE-AUDIT (buggy metrics, kept for traceability):
# Full-period (2010-2026): CAGR=9.7%, MDD=-26.5%, Calmar=0.366, Sharpe=0.551
# OOS (2020-2026): CAGR=14.7%, Calmar=0.541
# Walk-forward: 5/6 positive, avg Calmar 0.569
#
# The post-audit CAGR went UP because the ppy=252 bug in the old formula
# under-estimated calendar-day equity curves. Same curve, corrected math.

static:
  strategy_type: momentum_cascade
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 600
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  fast_lookback_days: [42]
  slow_lookback_days: [42]
  accel_threshold_pct: [15]
  min_momentum_pct: [20]
  breakout_window: [252]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [15]
  max_hold_days: [378]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [360]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [0.95]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
