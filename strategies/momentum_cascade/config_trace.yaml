exit:
  trailing_stop_pct: [13]
  max_hold_days: [504]

# Minimal sim config - matches standalone (equal weight, no ranking effects)
simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [10]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}

# Total: 1 entry x 1 exit x 1 sim = 1 config
