static:
  strategy_type: momentum_cascade
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 600
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# Round 2: Cross ALL important params
# IMPORTANT: accel (3), tsl (3), max_positions (3), max_hold (2), regime (2)
# MODERATE: slow_lb (2), breakout (2), sorting (2)
# FIXED at R1 best: fast_lb=42, min_mom=20, ranking=360, per_inst=1
#
# Entry: 3 x 2 x 2 x 2 = 24 combos
# Exit: 3 x 2 = 6 combos
# Sim: 2 x 3 = 6 combos
# Total: 24 x 6 x 6 = 864 configs

entry:
  fast_lookback_days: [42]
  slow_lookback_days: [42, 84]
  accel_threshold_pct: [15, 20, 25]
  min_momentum_pct: [20]
  breakout_window: [63, 252]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [0, 200]

exit:
  trailing_stop_pct: [15, 25, 30]
  max_hold_days: [252, 378]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer, top_average_txn]
  order_ranking_window_days: [360]
  max_positions: [15, 20, 30]
  max_positions_per_instrument: [1]
  order_value_multiplier: [0.95]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
