static:
  strategy_type: momentum_cascade
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 600
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# Round 3: Perturbation grid around champion
# Champion: accel=15, slow=42, breakout=252, regime=200, tsl=15, hold=378, gainer, pos=15
# Perturb each continuous param by +/-15-20%
# Fixed: breakout=252, regime=200, sort=top_gainer (all dominant in R2, no need to perturb)
#
# 3 x 3 x 3 x 3 x 3 = 243 configs

entry:
  fast_lookback_days: [42]
  slow_lookback_days: [35, 42, 50]
  accel_threshold_pct: [12, 15, 18]
  min_momentum_pct: [20]
  breakout_window: [252]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [12, 15, 18]
  max_hold_days: [320, 378, 440]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [360]
  max_positions: [12, 15, 18]
  max_positions_per_instrument: [1]
  order_value_multiplier: [0.95]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
