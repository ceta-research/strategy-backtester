static:
  strategy_type: momentum_cascade
  start_margin: 10000000       # Rs 1 crore
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 600           # ~2.5 years for slow momentum lookback + warmup
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

# Entry: 2 accel x 2 min_mom x 2 regime = 8 combos
# Top configs: C_safe (a>2%, m>20%, sma50), D_calmar (a>3%, m>20%, sma50), A_best (a>2%, m>15%, sma200)
entry:
  fast_lookback_days: [42]
  slow_lookback_days: [126]
  accel_threshold_pct: [2, 3]
  min_momentum_pct: [15, 20]
  breakout_window: [63]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [50, 200]

# Exit: 3 x 1 = 3 combos
exit:
  trailing_stop_pct: [10, 12, 13]
  max_hold_days: [504]

# Simulation: 3 x 2 x 2 = 12 combos
simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer, top_performer]
  order_ranking_window_days: [180]
  max_positions: [7, 10, 14]
  max_positions_per_instrument: [1, 3]
  order_value_multiplier: [0.95]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}

# Total: 8 entry x 3 exit x 12 sim = 288 configs
