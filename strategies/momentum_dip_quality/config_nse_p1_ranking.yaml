# P1: Ranking type comparison + scanner threshold test
# Test top_performer (ATO_Simulator default) vs top_gainer at 30d and 180d windows
# Also test higher scanner threshold (370M vs 70M)
# R3 winner entry params, R3 winner exit params
# Sweep: ranking (3) x window (2) x threshold (2) x pos (2) = 24 configs

static:
  strategy_type: momentum_dip_quality
  start_margin: 10000000
  start_epoch: 1262304000   # 2010-01-01
  end_epoch: 1773878400     # 2026-03-17
  prefetch_days: 1500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
    - {period: 125, threshold: 370000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  momentum_lookback_days: [189]
  momentum_percentile: [0.25]
  rerank_interval_days: [63]
  dip_threshold_pct: [5]
  peak_lookback_days: [63]
  rescreen_interval_days: [63]
  roe_threshold: [15]
  pe_threshold: [25]
  de_threshold: [1.0]
  fundamental_missing_mode: ['skip']
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  tsl_pct: [5]
  max_hold_days: [63, 252]
  require_peak_recovery: [true]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer, top_performer, top_dipper]
  order_ranking_window_days: [30, 180]
  max_positions: [7, 10]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}

# Total: 2 scanner x 1 entry x 2 exit x 12 sim = 48 configs
