# Match standalone champion params exactly in engine
# Standalone: mom=63d, pct=30%, dip=5%, tsl=10%, hold=504d, pos=10, ROE>15, PE<25
# Also test nearby params and with/without D/E filter
# Sweep: mom (3) x pct (2) x dip (2) x tsl (2) x de (2) x pos (2) = 96 configs

static:
  strategy_type: momentum_dip_quality
  start_margin: 10000000
  start_epoch: 1262304000   # 2010-01-01
  end_epoch: 1773878400     # 2026-03-17
  prefetch_days: 1500
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  momentum_lookback_days: [63, 126, 189]
  momentum_percentile: [0.25, 0.30]
  rerank_interval_days: [63]
  dip_threshold_pct: [5, 7]
  peak_lookback_days: [63]
  rescreen_interval_days: [63]
  roe_threshold: [15]
  pe_threshold: [25]
  de_threshold: [0, 1.0]
  fundamental_missing_mode: ['skip']
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [5, 10]
  max_hold_days: [252, 504]
  require_peak_recovery: [true]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [7, 10]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}

# Total: 1 scanner x 24 entry x 4 exit x 2 sim = 192 configs
