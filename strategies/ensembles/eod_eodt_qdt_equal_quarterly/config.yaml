# 3-leg full-period ensemble: eod_breakout + eod_technical + quality_dip_tiered
# Equal-weight (33/33/34) quarterly rebalance.
#
# QDT chosen as 3rd leg for mechanism diversity: mean-reversion (vs the
# breakout/technical legs). Correlations to existing 2 legs:
#   eod_breakout <-> QDT: 0.457 (lowest of all candidates)
#   eod_technical <-> QDT: 0.576
#
# Risk: QDT solo MDD is -47.4% (worst of all candidates). Diversification
# benefit must outweigh drag from concentrated drawdowns.

ensemble:
  name: eod_eodt_qdt_equal_quarterly
  description: 3-leg equal-weight quarterly, full 2010-2026 (eod_b + eod_t + QDT)
  starting_capital: 10000000
  alignment: intersection
  rebalance: quarterly
  weighting: fixed

  legs:
    - name: eod_breakout
      weight: 0.3333
      result_path: results/eod_breakout/champion.json
      rank: 1
    - name: eod_technical
      weight: 0.3333
      result_path: results/eod_technical/champion_verify.json
      rank: 1
    - name: quality_dip_tiered
      weight: 0.3334
      result_path: results/quality_dip_tiered/champion_verify.json
      rank: 1
