# factor_composite champion (2026-04-24, post-audit engine fbcd36a+).
#
# Full-period (2010-2026): CAGR=14.78%, MDD=-46.3%, Calmar=0.319
# R3 champion by Calmar. R2 top-10 all in this neighborhood (plateau).
#
# Params: lookback=350, skip=21, weights=mom_heavy, regime=0 (off),
#         top_n=30, vol_tgt=0.25, sl=0.30, sort=top_gainer, pos=15
#
# Data caveat: FMP NSE fundamentals sparse pre-2015, but factor_weights shows
# mom-heavy (0.6/0.2/0.2) matters only modestly vs pure_mom (1.0/0/0).
# Strategy is effectively long-horizon momentum with a small fundamental tilt.

static:
  strategy_type: factor_composite
  start_margin: 10000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1773878400        # 2026-03-30
  prefetch_days: 700
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  momentum_lookback_days: [350]
  momentum_skip_days: [21]
  factor_weights:
    - {momentum: 0.6, gross_profitability: 0.2, value: 0.2}
  regime_filter_sma: [0]
  top_n_stocks: [30]

exit:
  vol_target_annual: [0.25]
  vol_lookback_days: [126]
  stop_loss_pct: [0.30]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}
