static:
  start_margin: 500000
  start_epoch: 1577836800      # 2020-01-01
  end_epoch: 1741219200        # 2025-03-06
  prefetch_days: 30
  data_granularity: day
  strategy_type: gap_fill

scanner:
  instruments:
    - [{exchange: US, symbols: []}]
  price_threshold: [20]
  avg_day_transaction_threshold:
    - {period: 20, threshold: 50000000}
  n_day_gain_threshold:
    - {n: 30, threshold: -999}

entry:
  min_gap_down_pct: [0.005, 0.01]   # gap must be at least this much down (0.5%, 1%)
  max_gap_down_pct: [0.04]           # reject gaps > 4% (likely news-driven, won't fill)

exit:
  exit_at: [close]                   # "close" = sell at EOD close (intraday gap fill captured by close vs open)
  max_hold_days: [1]                 # always exit same day

simulation:
  default_sorting_type: [gap_size]
  order_sorting_type: [gap_size]
  order_ranking_window_days: [1]
  max_positions: [10, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: fixed, value: 50000}
