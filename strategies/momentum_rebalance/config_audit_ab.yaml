# Audit 2026-04-23 A/B — single representative Jegadeesh-Titman config on full NSE.
# One config is sufficient for flag-bias measurement; multi-config sweep adds noise.
# Pick: lookback=126, rebalance=21, num_positions=10 (classic J-T 12-1 approximation).

static:
  strategy_type: momentum_rebalance
  start_margin: 10000000
  start_epoch: 1262304000   # 2010-01-01
  end_epoch: 1773878400     # 2026-03-17
  prefetch_days: 600
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  momentum_lookback_days: [126]
  rebalance_interval_days: [21]
  num_positions: [10]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]
  moc_signal_lag_days: [0]   # overridden by measure_bias_impact.py

exit:
  max_hold_days: [0]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}

# 1 config per pass. Harness runs it twice.
