# Round 0: Baseline config for momentum_top_gainers optimization
# All params at single known-good defaults from shared priors + strategy defaults
# Data: nse_charting (primary), 2010-2026

static:
  strategy_type: momentum_top_gainers
  start_margin: 10000000
  start_epoch: 1262304000     # 2010-01-01
  end_epoch: 1773878400       # 2026-03-17
  prefetch_days: 600          # ~2.4 years for 252d lookback
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  momentum_lookback_days: [189]
  top_n_pct: [0.20]
  rebalance_interval_days: [21]
  min_momentum_pct: [5]
  direction_score_n_day_ma: [3]
  direction_score_threshold: [0.54]
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]

exit:
  trailing_stop_pct: [15]
  max_hold_days: [252]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [15]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
