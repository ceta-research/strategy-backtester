# Round 3: Robustness - fine grid around R2 champion
# Champion: lb=189, tn=0.50, rebal=2, mm=5, ds=0.45, tsl=40, hold=126, pos=30
# Perturb top params +/-15-20%
# Entry: 3*3*3*2*2 = 108 combos
# Exit: 3*3 = 9 combos
# Sim: 3 combos
# Total: 108 * 9 * 3 = 2916 -- too many, reduce
# Reduced: 3*3*2*2*1 = 36 entry x 3*2 exit x 3 sim = 648

static:
  strategy_type: momentum_top_gainers
  start_margin: 10000000
  start_epoch: 1262304000
  end_epoch: 1773878400
  prefetch_days: 800
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  # Champion neighborhood: perturb key params
  momentum_lookback_days: [168, 189, 210]       # +/-10%
  top_n_pct: [0.40, 0.50, 0.60]                 # +/-20%
  rebalance_interval_days: [2, 3]                # neighbors
  min_momentum_pct: [0, 5]                       # both R1/R2 bests
  direction_score_n_day_ma: [3]
  direction_score_threshold: [0.45]              # R2 winner, fixed
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [0]

exit:
  trailing_stop_pct: [30, 40, 50]                # +/-25%
  max_hold_days: [105, 126]                      # -15%, center

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [25, 30, 35]                    # +/-17%
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
