# V1: Quality Mild-Dip + SuperTrend Entry
# Target: 20%+ CAGR via quality universe + mild oscillation dip + SuperTrend flip
#
# Data insight: quality stocks (8+/10yr positive) with mild dips (osc<0.50)
# and momentum confirmation produce 87.8% avg 252d return, 74% win rate.
# SuperTrend flip provides stock-level trend confirmation.
#
# Config combos: 1 scanner x 48 entry x 6 exit = 288 total

static:
  strategy_type: ml_supertrend
  start_margin: 1000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1735689600        # 2025-01-01
  prefetch_days: 4000           # Need 10yr+ history for quality filter (10*252=2520 bars)
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  lookback_years: [10]
  min_positive_years: [7, 8]
  dip_threshold_pct: [10, 15]
  peak_lookback_days: [252]
  max_osc_position: [0.25, 0.50]
  supertrend_mode: [reversal]
  atr_period: [14, 20]
  atr_multiplier: [2.0, 2.5, 3.0]
  bounce_threshold_pct: [2.0]
  rescreen_interval_days: [63]
  # 2 x 2 x 2 x 2 x 3 = 48 entry combos

exit:
  trailing_stop_pct: [10, 15]
  max_hold_days: [126, 252]
  supertrend_exit: [false, true]
  # 2 x 2 x 2 - 2 (ST exit only matters when mode != off) = ~6 exit combos

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [15, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
