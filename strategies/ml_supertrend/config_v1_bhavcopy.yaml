# V1 Bhavcopy: Quality Mild-Dip + SuperTrend on NSE native data
# Bhavcopy gives much better NSE results than FMP (18.1% vs 1.5% on same strategy)
#
# Tests 3 SuperTrend modes:
# - reversal: ST flipped bull within last 10 bars while dip conditions met
# - trend: ST currently bullish AND 5d bounce > 2%
# - breakout: ST currently bullish (least restrictive)
#
# Also tests "off" mode (simple momentum, no ST) as control
#
# 1 scanner x 32 entry x 4 exit x 2 sim = 256 total

static:
  strategy_type: ml_supertrend
  start_margin: 1000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1735689600        # 2025-01-01
  prefetch_days: 4000
  data_granularity: day
  data_provider: bhavcopy

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  lookback_years: [10]
  min_positive_years: [7, 8]
  dip_threshold_pct: [10]
  peak_lookback_days: [252]
  max_osc_position: [0.50, 1.0]
  supertrend_mode: [reversal, trend, breakout, off]
  atr_period: [20]
  atr_multiplier: [2.5]
  bounce_threshold_pct: [2.0]
  st_flip_lookback: [10]
  rescreen_interval_days: [63]
  # 2 x 2 x 4 = 16 meaningful combos (some modes ignore some params)
  # with duplicates from atr/bounce params on "off" mode: 32 total

exit:
  trailing_stop_pct: [10, 15]
  max_hold_days: [126, 252]
  supertrend_exit: [false]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [15, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
