# V2: Quality Mild-Dip + Simple Momentum (control group - no SuperTrend)
# Tests whether SuperTrend adds value over simple 5d bounce detection
#
# Config combos: 1 scanner x 24 entry x 4 exit = 96 total

static:
  strategy_type: ml_supertrend
  start_margin: 1000000
  start_epoch: 1262304000      # 2010-01-01
  end_epoch: 1735689600        # 2025-01-01
  prefetch_days: 4000           # Need 10yr+ history for quality filter
  data_granularity: day

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: 0}

entry:
  lookback_years: [10]
  min_positive_years: [7, 8]
  dip_threshold_pct: [10, 15]
  peak_lookback_days: [252]
  max_osc_position: [0.25, 0.50]
  supertrend_mode: [off]
  atr_period: [20]
  atr_multiplier: [2.0]
  bounce_threshold_pct: [1.0, 2.0, 3.0]
  rescreen_interval_days: [63]
  # 2 x 2 x 2 x 3 = 24 entry combos

exit:
  tsl_pct: [10, 15]
  max_hold_days: [126, 252]
  supertrend_exit: [false]
  # 2 x 2 = 4 exit combos

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_performer]
  order_ranking_window_days: [180]
  max_positions: [15, 20]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1]
  max_order_value:
    - {type: percentage_of_instrument_avg_txn, value: 4.5}
