# Honest R2 re-sweep — narrow grid around pre-audit R2 champion region.
# Purpose: see if the post-audit champion moves, or if the strategy is structurally below NIFTYBEES.
#
# Pre-audit winner (Cal 0.638) was TSL=15, hold=1000, pos=8 on broken engine.
# Honest re-run of that exact config: Cal 0.205, CAGR 5.46%. Need to check neighbors.

static:
  strategy_type: earnings_dip
  start_margin: 10000000
  start_epoch: 1262304000   # 2010-01-01
  end_epoch: 1773878400     # 2026-03-17
  prefetch_days: 750
  data_granularity: day
  data_provider: nse_charting

scanner:
  instruments:
    - [{exchange: NSE, symbols: []}]
  price_threshold: [50]
  avg_day_transaction_threshold:
    - {period: 125, threshold: 70000000}
  n_day_gain_threshold:
    - {n: 360, threshold: -999}

entry:
  consecutive_positive_years: [2]
  min_yearly_return_pct: [0]
  surprise_threshold_pct: [1]
  dip_threshold_pct: [2, 3, 5]
  post_earnings_window: [20]
  peak_lookback_days: [63]
  rescreen_interval_days: [63]
  roe_threshold: [0]
  pe_threshold: [0]
  de_threshold: [0]
  fundamental_missing_mode: ['skip']
  regime_instrument: ['NSE:NIFTYBEES']
  regime_sma_period: [200]
  volume_ratio_max: [0]

exit:
  trailing_stop_pct: [15, 20, 25, 30]
  max_hold_days: [504, 756, 1000]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
  max_positions: [5, 8]
  max_positions_per_instrument: [1]
  order_value_multiplier: [1.0]
  max_order_value:
    - {type: fixed, value: 1000000000}

# 3 dip x 4 TSL x 3 hold x 2 pos = 72 configs
