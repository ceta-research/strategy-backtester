  roe_threshold: [0]
  pe_threshold: [0]
  de_threshold: [0]
  fundamental_missing_mode: ['skip']
  regime_instrument: ['']
  regime_sma_period: [0]
  volume_ratio_max: [0]

exit:
  trailing_stop_pct: [15]
  max_hold_days: [1000]

simulation:
  default_sorting_type: [top_gainer]
  order_sorting_type: [top_gainer]
  order_ranking_window_days: [30]
