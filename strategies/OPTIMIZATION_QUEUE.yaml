# When done: set status to COMPLETE, add best_calmar/best_cagr.
#
# Methodology: docs/OPTIMIZATION_RUNBOOK.md
# Per-strategy detail: strategies/{name}/OPTIMIZATION.md
# Results: results/{name}/round{N}_{description}.json
# Status script: python scripts/optimization_status.py

